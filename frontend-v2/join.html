<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join as a New Member | CU Intranet</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .join-page {
            background-color: var(--off);
            min-height: 100vh;
        }

        .form-container {
            max-width: 1000px;
            margin: 4rem auto;
            background: white;
            border-radius: var(--r-xl);
            box-shadow: var(--shadow-xl);
            overflow: hidden;
            border: 1px solid var(--g100);
            animation: slideUp 0.8s var(--ease) both;
        }

        .form-header {
            padding: 3rem;
            text-align: center;
            border-bottom: 1px solid var(--g100);
            background: var(--off);
        }

        .form-header h2 {
            font-family: var(--heading) !important;
            font-size: 2rem;
            color: var(--g900);
            font-weight: 800;
        }

        .form-body {
            padding: 4rem;
        }

        .section-title {
            text-align: center;
            font-family: var(--heading);
            font-size: 1.15rem;
            font-weight: 700;
            color: var(--g600);
            margin-bottom: 3rem;
            position: relative;
            display: inline-block;
            width: 100%;
        }

        .section-title::after {
            content: '';
            display: block;
            width: 80px;
            height: 3px;
            background: linear-gradient(90deg, var(--red), var(--blue-l));
            margin: 10px auto;
            border-radius: 2px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
            margin-bottom: 4rem;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .input-group label {
            font-family: inherit;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--g600);
            text-align: center;
        }

        .form-control {
            width: 100%;
            padding: 12px 16px;
            border: 1.5px solid var(--g200);
            border-radius: var(--r-md);
            font-size: 0.9rem;
            font-family: inherit;
            color: var(--g800);
            outline: none;
            transition: all 0.3s var(--ease);
            background: var(--white);
        }

        .form-control:focus {
            border-color: var(--blue);
            box-shadow: 0 0 0 3px rgba(13,71,161,0.1);
            background: white;
        }

        .tel-group {
            display: flex;
            gap: 0;
            border-radius: var(--r-md);
            overflow: hidden;
            border: 1.5px solid var(--g200);
            transition: all 0.3s var(--ease);
        }

        .tel-group:focus-within {
            border-color: var(--blue);
            box-shadow: 0 0 0 3px rgba(13,71,161,0.1);
        }

        .tel-prefix {
            background: var(--blue-bg);
            padding: 0 1rem;
            display: flex;
            align-items: center;
            font-weight: 700;
            color: var(--blue);
            border-right: 1.5px solid var(--g200);
            font-size: 0.88rem;
        }

        .tel-group input {
            border: none;
        }

        /* Email Verification Section */
        .verification-grid {
            display: grid;
            grid-template-columns: 1.5fr 0.5fr 1fr 0.5fr;
            gap: 1rem;
            align-items: flex-end;
        }

        .btn-action {
            background: linear-gradient(135deg, var(--blue), var(--blue-d));
            color: white;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: var(--r-sm);
            font-weight: 700;
            cursor: pointer;
            border: none;
            font-family: inherit;
            font-size: 0.82rem;
            transition: all 0.3s var(--bounce);
            box-shadow: 0 4px 12px rgba(13,71,161,0.2);
        }

        .btn-action:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(13,71,161,0.3);
        }

        .btn-submit {
            background: linear-gradient(135deg, var(--red), var(--red-d));
            color: white;
            width: 100%;
            padding: 14px;
            border-radius: 100px;
            font-size: 1rem;
            font-weight: 700;
            border: none;
            margin-top: 4rem;
            cursor: pointer;
            transition: all 0.3s var(--bounce);
            box-shadow: 0 6px 20px rgba(198,40,40,0.3);
            font-family: inherit;
        }

        .btn-submit:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 32px rgba(198,40,40,0.4);
        }

        .email-input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .email-suffix {
            position: absolute;
            right: 1rem;
            color: var(--g400);
            font-weight: 600;
            font-size: 0.85rem;
        }

        @media (max-width: 768px) {
            .form-grid, .verification-grid {
                grid-template-columns: 1fr;
            }
            .form-body {
                padding: 2rem;
            }
        }
    </style>
</head>
<body class="join-page">


    <main>
        <div class="form-container">
            <div class="form-header">
                <h2>Join as a new member</h2>
            </div>
            
            <form class="form-body">
                <!-- Personal Information -->
                <div class="section-title">Personal Information</div>
                <div class="form-grid">
                    <div class="input-group">
                        <label>Full Name</label>
                        <input type="text" class="form-control" placeholder="Enter your full name" required>
                    </div>
                    <div class="input-group">
                        <label>UID</label>
                        <input type="text" class="form-control" placeholder="Enter your UID" required>
                    </div>
                    <div class="input-group">
                        <label>Department</label>
                        <select class="form-control" required>
                            <option value="">Select Department</option>
                            <option>Applied Sciences</option>
                            <option>Computer Science</option>
                            <option>Mechanical Engineering</option>
                            <option>Business Management</option>
                        </select>
                    </div>
                    <div class="input-group">
                        <label>Mobile Number</label>
                        <div class="tel-group">
                            <span class="tel-prefix">+91</span>
                            <input type="tel" class="form-control" placeholder="Enter 10-digit number" required>
                        </div>
                    </div>
                </div>

                <!-- Entity Selection -->
                <div class="section-title">Select Entity & Category</div>
                <div class="form-grid">
                    <div class="input-group">
                        <label>Entity Type</label>
                        <select class="form-control" id="entityType" required>
                            <option value="">Select Entity Type</option>
                            <option>Clubs</option>
                            <option>Communities</option>
                            <option>Professional Societies</option>
                            <option>Departmental Societies</option>
                        </select>
                    </div>
                    <div class="input-group">
                        <label>Entity Category</label>
                        <select class="form-control" required>
                            <option value="">Select Entity Category</option>
                            <option>Technical</option>
                            <option>Cultural</option>
                            <option>Social</option>
                            <option>Academic</option>
                        </select>
                    </div>
                </div>

                <!-- Email Verification -->
                <div class="section-title">Email Verification</div>
                <div class="verification-grid">
                    <div class="input-group">
                        <label>Your Email</label>
                        <div class="email-input-wrapper">
                            <input type="text" class="form-control" required>
                            <span class="email-suffix">@cuchd.in</span>
                        </div>
                    </div>
                    <button type="button" class="btn-action">Send OTP</button>
                    <div class="input-group">
                        <label>Enter OTP</label>
                        <input type="text" class="form-control" placeholder="Enter OTP" required>
                    </div>
                    <button type="button" class="btn-action">Verify</button>
                </div>

                <button type="submit" class="btn-submit">Continue to Verification</button>
            </form>
        </div>
    </main>

    <footer style="padding: 4rem 5%; text-align: center; color: var(--text-muted); font-size: 0.8rem;">
        © 2026 CU Intranet. All rights reserved.
    </footer>

    <script>
        lucide.createIcons();

        // Page transition: swipe out before navigating
        document.querySelectorAll('a[href]').forEach(link => {
            const href = link.getAttribute('href');
            if (href && !href.startsWith('#') && !href.startsWith('http') && !href.startsWith('javascript')) {
                link.addEventListener('click', function(e) {
                    e.preventDefault();
                    document.body.classList.add('page-exit');
                    setTimeout(() => { window.location.href = href; }, 300);
                });
            }
        });

        // Handle browser back button (bfcache)
        window.addEventListener('pageshow', (event) => {
            if (event.persisted) {
                document.body.classList.remove('page-exit');
            }
        });
    </script>
</body>
</html>
